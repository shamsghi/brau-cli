name: Sync Release Metadata

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to sync, like vX.Y.Z
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: sync-release-metadata-${{ github.event.repository.full_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out default branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        env:
          EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          tag="${EVENT_TAG:-$INPUT_TAG}"
          if [[ -z "$tag" ]]; then
            echo "No release tag was provided." >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download formula source tarball
        env:
          TAG: ${{ steps.release.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          # Keep the checksum source identical to Formula/brau.rb's URL.
          tarball_url="https://github.com/$REPO/archive/refs/tags/$TAG.tar.gz"

          for attempt in 1 2 3 4 5 6; do
            if curl -LfsS \
              "$tarball_url" \
              -o /tmp/release.tar.gz; then
              exit 0
            fi

            echo "Release tarball for $TAG is not ready yet (attempt $attempt/6)." >&2
            sleep $((attempt * 5))
          done

          echo "Failed to download release tarball for $TAG after multiple attempts." >&2
          exit 1

      - name: Compute release checksum
        id: checksum
        run: |
          sha256="$(sha256sum /tmp/release.tar.gz | awk '{print $1}')"
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"

      - name: Update release metadata files
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          bash scripts/sync_release_metadata.sh \
            "${{ steps.release.outputs.tag }}" \
            "${{ steps.checksum.outputs.sha256 }}"

      - name: Commit synced files
        env:
          TAG: ${{ steps.release.outputs.tag }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if git diff --quiet -- Cargo.toml Cargo.lock Formula/brau.rb; then
            echo "Release metadata is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock Formula/brau.rb
          git commit -m "chore: sync release metadata for $TAG"

          for attempt in 1 2 3; do
            if git push origin "HEAD:$DEFAULT_BRANCH"; then
              exit 0
            fi

            echo "Push failed for synced metadata (attempt $attempt/3)." >&2
            git fetch origin "$DEFAULT_BRANCH"

            if ! git rebase "origin/$DEFAULT_BRANCH"; then
              git rebase --abort || true
              echo "Failed to rebase synced metadata commit onto $DEFAULT_BRANCH." >&2
              exit 1
            fi

            sleep $((attempt * 5))
          done

          echo "Failed to push synced metadata after multiple attempts." >&2
          exit 1
